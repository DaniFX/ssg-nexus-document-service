name: Deploy Document Service

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    uses: DaniFX/ssg-workflows/.github/workflows/cloudrun-deploy.yml@main
    with:
      service_name: ssg-document-service
    secrets: inherit
    # Secrets necessari nel repo:
    #   GCP_WORKLOAD_IDENTITY_PROVIDER, GCP_SERVICE_ACCOUNT_EMAIL
    #   GCP_PROJECT_ID, FIREBASE_STORAGE_BUCKET
    #   GATEWAY_URL, SERVICE_URL, INTERNAL_SECRET
    #   GCP_RUNTIME_SERVICE_ACCOUNT (SA del servizio)
