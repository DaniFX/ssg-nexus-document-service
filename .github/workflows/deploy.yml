name: Deploy Document Service

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    uses: DaniFX/ssg-workflows/.github/workflows/cloudrun-deploy.yml@main
    with:
      service_name: ssg-document-service
      service_account_flag: "--service-account=${{ secrets.GCP_SERVICE_ACCOUNT_DOCUMENT_SERVICE }}"
      env_vars: |
        ENV=production
        GCP_PROJECT_ID=${{ secrets.GCP_PROJECT_ID }}
        FIREBASE_STORAGE_BUCKET=${{ secrets.FIREBASE_STORAGE_BUCKET }}
        GATEWAY_URL=${{ secrets.GATEWAY_URL }}
        SERVICE_URL=${{ secrets.SERVICE_URL }}
        INTERNAL_SECRET=${{ secrets.INTERNAL_SECRET }}
    secrets: inherit
